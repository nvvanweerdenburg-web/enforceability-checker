<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dutch Enforceability Checker</title>
<style>
  :root {
    --bg: #fafaf7;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e4e4dd;
    --accent: #184f3e;
    --accent-fg: #ffffff;
    --warn-low: #2f7a4a;
    --warn-med: #b36b00;
    --warn-high: #a8261d;
    --card: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    padding: 2rem 1rem 4rem;
  }
  header {
    max-width: 860px;
    margin: 0 auto 1.5rem;
  }
  header h1 {
    font-size: 1.6rem;
    margin: 0 0 .3rem;
  }
  header p {
    color: var(--muted);
    margin: 0;
  }
  main {
    max-width: 860px;
    margin: 0 auto;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  label.upload {
    display: block;
    padding: 1.75rem;
    border: 2px dashed var(--line);
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    background: #fdfdfa;
    transition: border-color .15s, background .15s;
  }
  label.upload:hover, label.upload.drag {
    border-color: var(--accent);
    background: #f3f8f5;
  }
  label.upload input { display: none; }
  label.upload .big { font-weight: 600; display: block; margin-bottom: .25rem; }
  label.upload .small { color: var(--muted); font-size: .9rem; }
  textarea {
    width: 100%;
    min-height: 200px;
    padding: .75rem;
    border: 1px solid var(--line);
    border-radius: 6px;
    font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: #fff;
    resize: vertical;
  }
  .row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
  button {
    background: var(--accent);
    color: var(--accent-fg);
    border: 0;
    padding: .6rem 1.1rem;
    border-radius: 6px;
    font-size: .95rem;
    cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.ghost {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--line);
  }
  .tabs { display: flex; gap: .5rem; margin-bottom: .75rem; }
  .tab {
    padding: .35rem .8rem;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    cursor: pointer;
    font-size: .85rem;
  }
  .tab.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  #status {
    margin: .75rem 0;
    color: var(--muted);
    font-size: .9rem;
    min-height: 1.2em;
  }
  #status.error { color: var(--warn-high); }
  .badge {
    display: inline-block;
    padding: .1rem .55rem;
    border-radius: 999px;
    font-size: .78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .03em;
  }
  .sev-low  { background: #e7f1eb; color: var(--warn-low); }
  .sev-medium { background: #fbeed7; color: var(--warn-med); }
  .sev-high { background: #f7dcd9; color: var(--warn-high); }
  .finding {
    border-left: 4px solid var(--line);
    padding: .75rem 1rem;
    margin-bottom: .75rem;
    background: #fff;
    border-radius: 0 6px 6px 0;
  }
  .finding.sev-low    { border-left-color: var(--warn-low); }
  .finding.sev-medium { border-left-color: var(--warn-med); }
  .finding.sev-high   { border-left-color: var(--warn-high); }
  .finding h3 { margin: 0 0 .25rem; font-size: 1rem; }
  .finding .meta {
    color: var(--muted);
    font-size: .85rem;
    margin-bottom: .5rem;
  }
  .finding .quote {
    font-style: italic;
    background: #f6f6f0;
    padding: .5rem .7rem;
    border-radius: 4px;
    margin: .5rem 0;
    font-size: .9rem;
  }
  .finding .tag {
    display: inline-block;
    font-family: ui-monospace, Menlo, monospace;
    font-size: .78rem;
    background: #eef1e9;
    padding: 1px 6px;
    border-radius: 3px;
    color: #3a4a3a;
  }
  .summary {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: .75rem;
  }
  .summary .risk { font-weight: 600; text-transform: uppercase; letter-spacing: .04em; font-size: .8rem; padding: .25rem .6rem; border-radius: 4px; }
  .risk.low    { background: #e7f1eb; color: var(--warn-low); }
  .risk.medium { background: #fbeed7; color: var(--warn-med); }
  .risk.high   { background: #f7dcd9; color: var(--warn-high); }
  details summary { cursor: pointer; color: var(--muted); font-size: .85rem; padding: .5rem 0; }
  details pre {
    background: #f6f6f0;
    padding: .75rem;
    border-radius: 4px;
    overflow-x: auto;
    font-size: .8rem;
    max-height: 300px;
  }
  .hidden { display: none; }
</style>
</head>
<body>
<header>
  <h1>Dutch Enforceability Checker</h1>
  <p>Upload a contract or paste text. The system retrieves relevant Dutch-law grounds and returns an enforceability report.</p>
</header>

<main>
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-mode="upload">Upload file</div>
      <div class="tab" data-mode="text">Paste text</div>
    </div>

    <div id="pane-upload">
      <label class="upload" id="dropzone">
        <span class="big">Drop a PDF / DOCX / TXT here, or click to choose</span>
        <span class="small">Max 10 MB · Text stays on your machine; only the extracted text is sent to Claude for analysis</span>
        <input type="file" id="file" accept=".pdf,.docx,.txt,.md" />
      </label>
      <div class="row" style="margin-top:.75rem;">
        <span id="filename" style="color: var(--muted); font-size:.9rem;"></span>
      </div>
    </div>

    <div id="pane-text" class="hidden">
      <textarea id="text" placeholder="Paste the clause, agreement, or terms you'd like to check…"></textarea>
    </div>

    <div class="row" style="margin-top:1rem;">
      <button id="run">Check enforceability</button>
      <button id="clear" class="ghost">Clear</button>
    </div>
    <div id="status"></div>
  </div>

  <div id="result" class="hidden"></div>
</main>

<script>
const $  = (s) => document.querySelector(s);
const el = (t, cls, txt) => { const e = document.createElement(t); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };

let mode = "upload";
let file = null;

for (const tab of document.querySelectorAll(".tab")) {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    mode = tab.dataset.mode;
    $("#pane-upload").classList.toggle("hidden", mode !== "upload");
    $("#pane-text").classList.toggle("hidden", mode !== "text");
  });
}

const dz = $("#dropzone");
dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.classList.add("drag"); });
dz.addEventListener("dragleave", () => dz.classList.remove("drag"));
dz.addEventListener("drop", (e) => {
  e.preventDefault();
  dz.classList.remove("drag");
  if (e.dataTransfer.files?.[0]) {
    file = e.dataTransfer.files[0];
    $("#file").files = e.dataTransfer.files;
    $("#filename").textContent = `Selected: ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
  }
});
$("#file").addEventListener("change", (e) => {
  file = e.target.files[0] || null;
  $("#filename").textContent = file ? `Selected: ${file.name} (${(file.size/1024).toFixed(1)} KB)` : "";
});

$("#clear").addEventListener("click", () => {
  file = null;
  $("#file").value = "";
  $("#filename").textContent = "";
  $("#text").value = "";
  $("#result").classList.add("hidden");
  $("#result").innerHTML = "";
  setStatus("");
});

function setStatus(msg, isError = false) {
  const s = $("#status");
  s.textContent = msg;
  s.classList.toggle("error", !!isError);
}

$("#run").addEventListener("click", async () => {
  $("#result").classList.add("hidden");
  $("#result").innerHTML = "";
  $("#run").disabled = true;
  setStatus("Analysing — this takes 15-60 seconds depending on document size…");

  try {
    let resp;
    if (mode === "upload") {
      if (!file) { setStatus("Choose a file first.", true); $("#run").disabled = false; return; }
      const fd = new FormData();
      fd.append("file", file);
      resp = await fetch("/api/check", { method: "POST", body: fd });
    } else {
      const text = $("#text").value.trim();
      if (!text) { setStatus("Paste some text first.", true); $("#run").disabled = false; return; }
      const fd = new FormData();
      fd.append("text", text);
      resp = await fetch("/api/check-text", { method: "POST", body: fd });
    }
    if (!resp.ok) {
      let msg = `Request failed (${resp.status})`;
      try { const e = await resp.json(); if (e.detail) msg = e.detail; } catch {}
      setStatus(msg, true);
      return;
    }
    const report = await resp.json();
    render(report);
    setStatus("Done.");
  } catch (e) {
    console.error(e);
    setStatus(`Error: ${e.message}`, true);
  } finally {
    $("#run").disabled = false;
  }
});

function render(r) {
  const out = $("#result");
  out.innerHTML = "";
  out.classList.remove("hidden");

  const head = el("div", "card");
  head.appendChild(el("h2", null, "Report"));

  const summary = el("div", "summary");
  if (r.overall_risk) {
    const badge = el("span", `risk ${r.overall_risk}`, `risk: ${r.overall_risk}`);
    summary.appendChild(badge);
  }
  if (r.document_type) summary.appendChild(el("span", null, `· ${r.document_type}`));
  if (r.language) summary.appendChild(el("span", null, `· language: ${r.language}`));
  head.appendChild(summary);

  if (r.overall_assessment) {
    head.appendChild(el("p", null, r.overall_assessment));
  }
  out.appendChild(head);

  const findings = Array.isArray(r.findings) ? r.findings : [];
  const fcard = el("div", "card");
  fcard.appendChild(el("h2", null, `Findings (${findings.length})`));
  if (findings.length === 0) {
    fcard.appendChild(el("p", null, "No enforceability issues identified against the supplied taxonomy."));
  } else {
    for (const f of findings) {
      const sev = (f.severity || "low").toLowerCase();
      const div = el("div", `finding sev-${sev}`);
      const title = el("h3");
      title.appendChild(el("span", `badge sev-${sev}`, sev));
      title.appendChild(document.createTextNode(" " + (f.issue || "(unnamed issue)")));
      div.appendChild(title);

      const meta = el("div", "meta");
      if (f.section) meta.appendChild(el("span", null, `§${f.section}`));
      if (f.qualification) { meta.appendChild(document.createTextNode(" · ")); meta.appendChild(el("span", null, f.qualification)); }
      if (f.who_can_invoke) { meta.appendChild(document.createTextNode(" · invocable by: ")); meta.appendChild(el("span", null, f.who_can_invoke)); }
      div.appendChild(meta);

      if (f.rag_tag) {
        const tag = el("div");
        tag.appendChild(el("span", "tag", f.rag_tag));
        div.appendChild(tag);
      }
      if (f.clause_quote) div.appendChild(el("div", "quote", `“${f.clause_quote}”`));
      if (f.reasoning) div.appendChild(el("p", null, f.reasoning));
      if (f.suggested_fix) {
        const fix = el("p");
        fix.appendChild(el("strong", null, "Suggested fix: "));
        fix.appendChild(document.createTextNode(f.suggested_fix));
        div.appendChild(fix);
      }
      fcard.appendChild(div);
    }
  }
  out.appendChild(fcard);

  if (Array.isArray(r.caveats) && r.caveats.length) {
    const ccard = el("div", "card");
    ccard.appendChild(el("h2", null, "Caveats"));
    const ul = el("ul");
    for (const c of r.caveats) ul.appendChild(el("li", null, c));
    ccard.appendChild(ul);
    out.appendChild(ccard);
  }

  // Debug / transparency section.
  const dbg = el("div", "card");
  const det = document.createElement("details");
  det.appendChild(el("summary", null, "Retrieved taxonomy entries & raw JSON"));
  const pre = document.createElement("pre");
  pre.textContent = JSON.stringify(r, null, 2);
  det.appendChild(pre);
  dbg.appendChild(det);
  out.appendChild(dbg);
}
</script>
</body>
</html>
